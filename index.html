<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-SENSOR V4 (FINAL)</title>
    <style>
        :root { --bg: #000000; --green: #0f0; --red: #f00; --panel: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        
        /* HUD */
        .top-bar { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; }
        .status { font-weight: bold; color: var(--green); }
        .status.error { color: var(--red); }

        /* GRAPH */
        .chart-box { width: 100%; height: 120px; background: #111; border: 1px solid #333; margin-bottom: 10px; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        .chart-label { position: absolute; top: 2px; right: 2px; font-size: 10px; color: #555; }

        /* DATA GRID */
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sensor-card { background: var(--panel); padding: 10px; border-radius: 4px; border: 1px solid #333; }
        .sensor-title { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid #444; }
        .val { font-size: 16px; font-weight: bold; color: var(--green); display: block; text-align: right; }
        .val-label { font-size: 10px; color: #666; float: left; margin-top: 4px; }

        /* LOGS */
        #debug-log { height: 80px; overflow-y: scroll; font-size: 10px; border-top: 1px solid #333; margin-top: 10px; color: #aaa; padding-top: 5px; }

        /* CONTROLS */
        .control-dock { position: fixed; bottom: 0; left: 0; width: 100%; padding: 10px; background: #000; border-top: 1px solid #333; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; box-sizing: border-box; }
        .btn { background: #222; color: #fff; border: 1px solid #555; padding: 15px; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; }
        .btn-primary { background: var(--green); color: #000; border: none; }
        .btn-danger { background: var(--red); color: #fff; border: none; }

        /* WARNING OVERLAY */
        #https-warning { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(50,0,0,0.95); z-index: 999; display: none; align-items: center; justify-content: center; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="https-warning">
        <div>
            <h2 style="color:red">SECURITY WARNING</h2>
            <p>Sensors are BLOCKED on HTTP.</p>
            <p>You MUST use HTTPS.</p>
        </div>
    </div>

    <div class="top-bar">
        <span>FREQ: <span id="hz-val">0</span> Hz</span>
        <span id="sys-status" class="status">STANDBY</span>
    </div>

    <!-- LIVE GRAPH (Movement History) -->
    <div class="chart-box">
        <div class="chart-label">MOVEMENT INTENSITY (G-FORCE)</div>
        <canvas id="graph"></canvas>
    </div>

    <div class="data-grid">
        <!-- ACCELEROMETER -->
        <div class="sensor-card">
            <div class="sensor-title">Accel (Inc. Gravity)</div>
            <div><span class="val-label">X</span><span id="ax" class="val">0.00</span></div>
            <div><span class="val-label">Y</span><span id="ay" class="val">0.00</span></div>
            <div><span class="val-label">Z</span><span id="az" class="val">0.00</span></div>
        </div>
        <!-- GYROSCOPE -->
        <div class="sensor-card">
            <div class="sensor-title">Rotation (Deg/s)</div>
            <div><span class="val-label">A</span><span id="ga" class="val">0.00</span></div>
            <div><span class="val-label">B</span><span id="gb" class="val">0.00</span></div>
            <div><span class="val-label">G</span><span id="gg" class="val">0.00</span></div>
        </div>
    </div>

    <div id="debug-log">> SYSTEM READY. PRESS START.</div>

    <div class="control-dock">
        <button class="btn btn-primary" id="btn-start">1. START SENSORS</button>
        <button class="btn btn-danger" id="btn-bg">2. GO BACKGROUND</button>
    </div>

    <!-- PiP Anchor -->
    <video id="pip-video" loop playsinline muted style="width:1px; height:1px; position:fixed; opacity:0; pointer-events:none;">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <script>
        // --- CONFIGURATION ---
        const ui = {
            ax: document.getElementById('ax'), ay: document.getElementById('ay'), az: document.getElementById('az'),
            ga: document.getElementById('ga'), gb: document.getElementById('gb'), gg: document.getElementById('gg'),
            hz: document.getElementById('hz-val'), log: document.getElementById('debug-log'),
            status: document.getElementById('sys-status')
        };
        
        const state = { frame: 0, lastTime: performance.now(), history: new Array(300).fill(10), active: false };
        const ctx = document.getElementById('graph').getContext('2d');

        // --- UTILS ---
        function log(msg) {
            console.log(msg);
            ui.log.innerHTML = `> ${msg}<br>` + ui.log.innerHTML;
        }

        // --- 1. SECURITY CHECK ---
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            document.getElementById('https-warning').style.display = 'flex';
        }

        // --- 2. DATA HANDLER (The "Dual Stack") ---
        function handleMotion(event) {
            // Chrome often separates Gravity. We want "accelerationIncludingGravity" for raw physics.
            const acc = event.accelerationIncludingGravity || event.acceleration;
            const rot = event.rotationRate;

            if (acc) {
                ui.ax.innerText = (acc.x || 0).toFixed(2);
                ui.ay.innerText = (acc.y || 0).toFixed(2);
                ui.az.innerText = (acc.z || 0).toFixed(2);

                // Calculate Total G-Force (Vector Magnitude) for Graph
                const mag = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
                state.history.push(mag);
                state.history.shift();
            }

            if (rot) {
                ui.ga.innerText = (rot.alpha || 0).toFixed(1);
                ui.gb.innerText = (rot.beta || 0).toFixed(1);
                ui.gg.innerText = (rot.gamma || 0).toFixed(1);
            }

            state.active = true;
        }

        // --- 3. INITIALIZATION STRATEGIES ---
        async function igniteSensors() {
            log("Requesting Permission...");
            
            // STRATEGY A: iOS 13+ / Android 14+ Permission Request
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceMotionEvent.requestPermission();
                    if (response === 'granted') {
                        log("Permission GRANTED (Secure).");
                        window.addEventListener('devicemotion', handleMotion);
                        ui.status.innerText = "ACTIVE (SECURE)";
                    } else {
                        log("Permission DENIED by User.");
                    }
                } catch (e) {
                    log("Permission API Error: " + e.message);
                }
            } 
            // STRATEGY B: Standard Non-Gated Access (Old Android/Desktop)
            else {
                log("Standard Access Attempt...");
                window.addEventListener('devicemotion', handleMotion);
                
                // Check if we are actually getting data after 500ms
                setTimeout(() => {
                    if (!state.active) {
                        log("FAIL: No data received. Check Browser Flags.");
                        ui.status.innerText = "BLOCKED/NO SENSOR";
                        ui.status.classList.add('error');
                    } else {
                        log("SUCCESS: Standard Stream Active.");
                        ui.status.innerText = "ACTIVE (STD)";
                    }
                }, 1000);
            }
        }

        // --- 4. BACKGROUND BYPASS (PiP + WakeLock) ---
        async function goBackground() {
            log("Engaging Background Protocol...");
            const vid = document.getElementById('pip-video');
            
            try {
                await vid.play();
                if (document.pictureInPictureEnabled) {
                    await vid.requestPictureInPicture();
                    log("PiP Mode: ON. Minimize Chrome NOW.");
                }
                
                if ('wakeLock' in navigator) {
                    await navigator.wakeLock.request('screen');
                    log("WakeLock: ON. CPU Throttling Disabled.");
                }
            } catch (e) {
                log("Bypass Error: " + e.message);
            }
        }

        // --- 5. VISUAL RENDER LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            
            // FPS Counter
            const now = performance.now();
            state.frame++;
            if (now - state.lastTime >= 1000) {
                ui.hz.innerText = state.frame;
                state.frame = 0;
                state.lastTime = now;
            }

            // Draw Graph
            const w = ctx.canvas.width = ctx.canvas.offsetWidth;
            const h = ctx.canvas.height = ctx.canvas.offsetHeight;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, w, h);
            
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            const step = w / state.history.length;
            state.history.forEach((val, i) => {
                // Scale: 0 to 20m/s^2 maps to height
                const y = h - ((val / 20) * h);
                if (i===0) ctx.moveTo(0, y);
                else ctx.lineTo(i*step, y);
            });
            ctx.stroke();
        }

        // --- BINDINGS ---
        document.getElementById('btn-start').addEventListener('click', igniteSensors);
        document.getElementById('btn-bg').addEventListener('click', goBackground);
        
        loop(); // Start Render Engine
    </script>
</body>
</html>
