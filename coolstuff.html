<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>True-Sync Sensor Level</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', monospace; }
        canvas { display: block; }

        /* UI OVERLAY */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .hud-panel { 
            position: absolute; bottom: 20px; left: 20px; 
            background: rgba(0,0,0,0.5); padding: 15px; border-left: 4px solid #00ffcc; 
            backdrop-filter: blur(4px); color: #fff;
        }
        .hud-row { display: flex; justify-content: space-between; width: 200px; margin-bottom: 5px; font-size: 13px; }
        .val { font-weight: bold; color: #00ffcc; font-family: monospace; }

        /* LEVEL VISUALIZER (2D OVERLAY) */
        #level-ring {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%;
            background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center;
        }
        #level-bubble {
            width: 10px; height: 10px; background: #00ffcc; border-radius: 50%;
            box-shadow: 0 0 10px #00ffcc; transition: transform 0.1s;
        }
        .level-cross { position: absolute; background: rgba(255,255,255,0.1); }
        
        /* CONTROLS */
        .btn {
            pointer-events: auto; background: #00ffcc; border: none; color: #000;
            padding: 12px 24px; font-weight: bold; text-transform: uppercase; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
            font-size: 12px; border-radius: 4px;
        }
        #btn-cal { position: absolute; top: 20px; right: 20px; background: transparent; border: 1px solid #00ffcc; color: #00ffcc; }
        #btn-start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; padding: 20px 40px; }

    </style>
    
    <!-- THREE.JS -->
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>

    <div id="ui">
        <!-- 2D Level at Top -->
        <div id="level-ring">
            <div class="level-cross" style="width: 100%; height: 1px;"></div>
            <div class="level-cross" style="height: 100%; width: 1px;"></div>
            <div id="level-bubble"></div>
        </div>

        <button id="btn-cal" class="btn">⟲ Sync Position</button>

        <div class="hud-panel">
            <div style="margin-bottom:10px; color:#aaa; font-size:10px;">SENSOR TELEMETRY</div>
            <div class="hud-row"><span>X (BETA)</span> <span id="val-x" class="val">0°</span></div>
            <div class="hud-row"><span>Y (GAMMA)</span> <span id="val-y" class="val">0°</span></div>
            <div class="hud-row"><span>Z (ALPHA)</span> <span id="val-z" class="val">0°</span></div>
            <div class="hud-row" style="margin-top:10px; border-top:1px solid #444; padding-top:5px;">
                <span>LEVEL</span> <span id="val-inc" class="val">0°</span>
            </div>
        </div>
        
        <button id="btn-start" class="btn">Connect Sensors</button>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        // Isometric Camera Angle
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 20, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0x00ffcc, 2);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 2. OBJECTS ---
        
        // Floor Grid
        const grid = new THREE.GridHelper(50, 50, 0x333333, 0x111111);
        scene.add(grid);

        // Device Container (For pivoting)
        const pivot = new THREE.Group();
        scene.add(pivot);

        // The Phone Model
        const boxGeo = new THREE.BoxGeometry(9, 1, 18);
        const matBody = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.4 });
        const matScreen = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.8 });
        
        // Materials: Sides are body, Top is screen
        const mats = [matBody, matBody, matScreen, matBody, matBody, matBody];
        const phone = new THREE.Mesh(boxGeo, mats);
        phone.castShadow = true;
        pivot.add(phone);

        // "Notch" Indicator (Top of phone)
        const notch = new THREE.Mesh(
            new THREE.BoxGeometry(3, 0.1, 0.5),
            new THREE.MeshBasicMaterial({ color: 0x00ffcc })
        );
        notch.position.set(0, 0.51, -8);
        phone.add(notch);

        // On-Screen Bubble Level (3D)
        const bubbleGeo = new THREE.CircleGeometry(1.5, 32);
        const bubbleMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.5 });
        const bubble3D = new THREE.Mesh(bubbleGeo, bubbleMat);
        bubble3D.rotation.x = -Math.PI / 2;
        bubble3D.position.set(0, 0.52, 0);
        phone.add(bubble3D);


        // --- 3. SENSOR MATH (QUATERNIONS) ---
        
        let deviceQ = new THREE.Quaternion(); // The raw sensor rotation
        let calibrateQ = new THREE.Quaternion(); // The offset (sync)
        let finalQ = new THREE.Quaternion(); // The result
        
        const euler = new THREE.Euler();
        const zee = new THREE.Vector3(0, 0, 1);
        const degToRad = Math.PI / 180;

        // Function to convert DeviceOrientation alpha/beta/gamma to Quaternion
        // Source: Three.js DeviceOrientationControls Logic
        function setObjectQuaternion(quaternion, alpha, beta, gamma, orient) {
            euler.set(beta, alpha, -gamma, 'YXZ'); // Intrinsic rotation order for sensors
            quaternion.setFromEuler(euler);
            
            // Adjust for screen orientation (Portrait/Landscape)
            const orientQ = new THREE.Quaternion();
            orientQ.setFromAxisAngle(zee, -orient);
            quaternion.multiply(orientQ);
            
            // Rotate -90 deg around X to align phone "flat" with Z-axis
            const alignQ = new THREE.Quaternion();
            alignQ.setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);
            quaternion.multiply(alignQ);
        }

        // Calibration Handler
        document.getElementById('btn-cal').addEventListener('click', () => {
            // Create an inverse quaternion of the current state
            // This sets the current position as "Zero" (Identity)
            calibrateQ.copy(deviceQ).invert();
        });

        // --- 4. EVENT LOOP ---

        window.addEventListener('deviceorientation', (event) => {
            // Capture Data
            const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
            const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
            const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;
            const orient = window.orientation ? THREE.MathUtils.degToRad(window.orientation) : 0;

            // 1. Update Raw Quaternion
            setObjectQuaternion(deviceQ, alpha, beta, gamma, orient);

            // 2. Apply Calibration
            finalQ.multiplyQuaternions(calibrateQ, deviceQ);

            // 3. Apply to 3D Object
            pivot.setRotationFromQuaternion(finalQ);

            // 4. Update HUD Data
            document.getElementById('val-x').innerText = Math.round(event.beta) + "°";
            document.getElementById('val-y').innerText = Math.round(event.gamma) + "°";
            document.getElementById('val-z').innerText = Math.round(event.alpha) + "°";

            // 5. Level Calculation (Inclination)
            // Calculate total tilt from vertical (90deg) or flat
            const tiltX = event.beta; // Front/Back
            const tiltY = event.gamma; // Left/Right
            
            // Update 2D Bubble UI
            // Map -45/45 degrees to -30/30 pixels
            const xOffset = Math.max(-30, Math.min(30, tiltY)); 
            const yOffset = Math.max(-30, Math.min(30, tiltX));
            document.getElementById('level-bubble').style.transform = `translate(${xOffset}px, ${yOffset}px)`;

            // Update 3D Bubble
            // Slide the dot on the phone screen surface
            bubble3D.position.x = -Math.max(-4, Math.min(4, tiltY / 10));
            bubble3D.position.z = -Math.max(-8, Math.min(8, tiltX / 10));

            // Total Angle from flat
            const inclination = Math.sqrt(tiltX*tiltX + tiltY*tiltY);
            document.getElementById('val-inc').innerText = inclination.toFixed(1) + "°";
            document.getElementById('val-inc').style.color = inclination < 3 ? "#0f0" : "#fff";
        });


        // --- 5. INITIALIZATION ---
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        document.getElementById('btn-start').addEventListener('click', async () => {
            // iOS Check
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const perm = await DeviceOrientationEvent.requestPermission();
                if (perm !== 'granted') alert('Permission needed for sync');
            }
            document.getElementById('btn-start').style.display = 'none';
            animate();
        });
        
        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
