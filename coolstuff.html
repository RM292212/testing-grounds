<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Precision Gyro Twin — Fixed</title>
  <style>
    body { margin:0; overflow:hidden; background:#0e0f12; color:#eee; font-family:sans-serif; }
    #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
    button{padding:12px 18px;border-radius:20px;border:none;background:#52ffa8;color:#000;font-weight:bold;cursor:pointer}
  </style>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
</head>
<body>

<div id="overlay">
  <button id="start">START</button>
</div>

<script type="module">
import * as THREE from 'three';

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0,0,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// Model
const phone = new THREE.Group();
scene.add(phone);

const body = new THREE.Mesh(
  new THREE.BoxGeometry(7,14,1),
  new THREE.MeshStandardMaterial({color:0x222222})
);
phone.add(body);

// ✅ FIX: Removed invalid RoundedBoxGeometry usage
function createNotch() {
  return new THREE.Mesh(
    new THREE.BoxGeometry(1.6,0.3,0.1),
    new THREE.MeshBasicMaterial({color:0x333333})
  );
}

const notch = createNotch();
notch.position.set(0,6,0.6);
phone.add(notch);

// Orientation
const euler = new THREE.Euler();
const targetQ = new THREE.Quaternion();
const currentQ = new THREE.Quaternion();

function handleOrientation(e){
  if(e.alpha == null) return;

  const alpha = THREE.MathUtils.degToRad(e.alpha);
  const beta = THREE.MathUtils.degToRad(e.beta);
  const gamma = THREE.MathUtils.degToRad(e.gamma);

  euler.set(beta, alpha, -gamma, 'YXZ');
  targetQ.setFromEuler(euler);
}

function animate(){
  requestAnimationFrame(animate);
  currentQ.slerp(targetQ,0.15);
  phone.quaternion.copy(currentQ);
  renderer.render(scene,camera);
}

// Start
start.onclick = async ()=>{
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    const p = await DeviceOrientationEvent.requestPermission();
    if(p !== 'granted') return;
  }

  window.addEventListener('deviceorientation', handleOrientation);
  overlay.style.display='none';
  animate();
};

// Resize
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------------- TESTS ----------------
// Basic sanity checks to prevent regression
console.assert(typeof THREE.BoxGeometry === 'function', 'BoxGeometry must exist');
console.assert(typeof THREE.Mesh === 'function', 'Mesh must exist');
console.assert(typeof createNotch() !== 'undefined', 'Notch creation must work');

</script>
</body>
</html>
