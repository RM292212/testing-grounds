<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-SENSOR V2</title>
    <style>
        :root { --bg: #000; --green: #0f0; --dim: #333; --text: #ccc; }
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; padding: 15px; }
        
        /* COMPASS UI */
        .compass-ring { width: 200px; height: 200px; border: 2px solid #333; border-radius: 50%; margin: 20px auto; position: relative; background: radial-gradient(circle, #111 0%, #000 70%); box-shadow: 0 0 20px #111; }
        .needle { width: 4px; height: 100px; background: red; position: absolute; top: 0; left: 50%; transform-origin: bottom center; transition: transform 0.1s cubic-bezier(0.2, 0, 0, 1); z-index: 2; }
        .needle::after { content: ''; display: block; width: 4px; height: 100px; background: #fff; position: absolute; top: 100%; }
        .tick { position: absolute; font-weight: bold; font-size: 14px; color: #555; }
        .n { top: 5px; left: 50%; transform: translateX(-50%); color: red; }
        .e { right: 10px; top: 50%; transform: translateY(-50%); }
        .s { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .w { left: 10px; top: 50%; transform: translateY(-50%); }

        /* DATA BOXES */
        .panel { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .label { font-size: 10px; text-transform: uppercase; color: #666; display: block; margin-bottom: 5px; }
        .value { font-size: 18px; color: var(--green); font-weight: bold; }
        .err { color: #f00; font-size: 11px; }

        /* BUTTONS */
        button { width: 100%; padding: 15px; background: #222; color: #fff; border: 1px solid #555; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background: #333; }
    </style>
</head>
<body>

    <!-- 1. COMPASS SECTION -->
    <div class="panel" style="text-align:center;">
        <span class="label">TRUE NORTH COMPASS</span>
        <div class="compass-ring">
            <span class="tick n">N</span><span class="tick e">E</span>
            <span class="tick s">S</span><span class="tick w">W</span>
            <div id="needle" class="needle"></div>
        </div>
        <div id="heading-display" class="value">0°</div>
        <div id="compass-mode" style="font-size:10px; color:#666; margin-top:5px;">WAITING...</div>
    </div>

    <!-- 2. SENSOR DEBUGGER -->
    <div class="panel">
        <span class="label">AMBIENT LIGHT (LUX)</span>
        <div id="lux-val" class="value">--</div>
        <div id="lux-stat" class="err">Status: Idle</div>
    </div>

    <div class="panel">
        <span class="label">PROXIMITY (CM)</span>
        <div id="prox-val" class="value">--</div>
        <div id="prox-stat" class="err">Status: Idle</div>
    </div>

    <button onclick="startSensors()">ACTIVATE SENSORS</button>
    <div id="log" style="font-size:10px; color:#555; margin-top:20px; height:100px; overflow-y:scroll; border-top:1px solid #333;"></div>

    <script>
        const ui = {
            head: document.getElementById('heading-display'),
            needle: document.getElementById('needle'),
            mode: document.getElementById('compass-mode'),
            lux: document.getElementById('lux-val'),
            luxStat: document.getElementById('lux-stat'),
            prox: document.getElementById('prox-val'),
            proxStat: document.getElementById('prox-stat'),
            log: document.getElementById('log')
        };

        function log(msg) { ui.log.innerHTML = `> ${msg}<br>` + ui.log.innerHTML; }

        // --- 1. THE COMPASS FIX (Absolute vs Relative) ---
        function handleOrientation(event) {
            let heading = null;
            let mode = "Unknown";

            // CASE A: iOS (Webkit) - True North is native
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
                mode = "iOS Absolute (True North)";
            } 
            // CASE B: Android Chrome - Needs 'deviceorientationabsolute'
            // We handle this in a separate event listener below
            else if (event.absolute === true && event.alpha !== null) {
                // Standard Absolute (Rarely works on Chrome without the specific event)
                heading = 360 - event.alpha; 
                mode = "Android Absolute";
            } 
            // CASE C: Relative (Fallback)
            else if (event.alpha !== null) {
                heading = 360 - event.alpha; // Invert rotation
                mode = "Relative (Uncalibrated)";
            }

            if (heading !== null) {
                // Normalize to 0-360
                if (heading < 0) heading += 360;
                heading = heading % 360;

                ui.head.innerText = heading.toFixed(0) + "°";
                ui.mode.innerText = mode;
                
                // Rotate the needle (Visual is inverted relative to phone)
                ui.needle.style.transform = `translateX(-50%) rotate(${-heading}deg)`;
            }
        }

        // --- 2. SENSOR ACTIVATION ---
        async function startSensors() {
            log("Initializing...");

            // A. COMPASS: Try the "Absolute" event first (Chrome Android specific)
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', (e) => {
                    const heading = 360 - e.alpha;
                    ui.head.innerText = heading.toFixed(0) + "°";
                    ui.mode.innerText = "Chrome Absolute (True North)";
                    ui.needle.style.transform = `translateX(-50%) rotate(${-heading}deg)`;
                });
                log("Bound: deviceorientationabsolute");
            } else {
                // Fallback for iOS / Others
                window.addEventListener('deviceorientation', handleOrientation);
                log("Bound: deviceorientation (Standard)");
            }

            // Permissions for iOS 13+
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }

            // B. LIGHT SENSOR (The "Hard" Try)
            if ('AmbientLightSensor' in window) {
                try {
                    const sensor = new AmbientLightSensor();
                    sensor.addEventListener('reading', () => {
                        ui.lux.innerText = sensor.illuminance + " lx";
                        ui.luxStat.innerText = "Active";
                        ui.luxStat.style.color = "#0f0";
                    });
                    sensor.addEventListener('error', (e) => {
                        ui.luxStat.innerText = `Blocked: ${e.error.name}`;
                        log(`Lux Error: ${e.error.name} (Enable Flags!)`);
                    });
                    sensor.start();
                } catch (err) {
                    ui.luxStat.innerText = "SecurityError (Flag Required)";
                }
            } else {
                ui.luxStat.innerText = "Not Supported by Browser";
            }

            // C. PROXIMITY SENSOR
            if ('ProximitySensor' in window) {
                try {
                    const prox = new ProximitySensor();
                    prox.addEventListener('reading', () => {
                        ui.prox.innerText = prox.distance + " cm";
                        ui.proxStat.innerText = prox.near ? "NEAR" : "FAR";
                    });
                    prox.addEventListener('error', (e) => {
                        ui.proxStat.innerText = `Blocked: ${e.error.name}`;
                    });
                    prox.start();
                } catch (err) {
                    ui.proxStat.innerText = "SecurityError (Flag Required)";
                }
            } else {
                ui.proxStat.innerText = "Not Supported by Browser";
            }
        }
    </script>
</body>
</html>
