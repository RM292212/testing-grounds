<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holo-Sensor Twin</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a10; font-family: 'Segoe UI', monospace; }
        canvas { display: block; }

        /* HUD INTERFACE */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; }
        .hud-panel { position: absolute; bottom: 30px; left: 20px; color: #00ffff; text-shadow: 0 0 5px #00ffff; }
        .hud-row { display: flex; align-items: center; gap: 15px; margin-bottom: 5px; font-size: 14px; }
        .hud-val { font-weight: bold; font-size: 18px; color: #fff; min-width: 60px; }
        .hud-label { text-transform: uppercase; font-size: 10px; opacity: 0.8; letter-spacing: 1px; }

        /* CALIBRATION BUTTON */
        #cal-btn {
            position: absolute; top: 20px; right: 20px; pointer-events: auto;
            background: rgba(0, 255, 255, 0.1); border: 1px solid #00ffff; color: #00ffff;
            padding: 10px 20px; font-weight: bold; text-transform: uppercase; cursor: pointer;
            backdrop-filter: blur(4px); font-size: 12px; letter-spacing: 1px;
            transition: 0.2s;
        }
        #cal-btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 15px #00ffff; }

        /* START OVERLAY */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 16, 0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto; z-index: 999;
        }
        #start-btn {
            padding: 20px 50px; font-size: 18px; background: #00ffff; border: none;
            color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }
        #start-btn:active { transform: scale(0.98); }
    </style>
    
    <!-- THREE.JS IMPORT -->
    <script type="importmap">
      { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">Initialize Holo-Deck</button>
        <div style="color:#00ffff; margin-top:15px; font-size:12px; opacity:0.7;">REQUIRES GYROSCOPE PERMISSION</div>
    </div>

    <div id="ui-layer">
        <button id="cal-btn">⌖ Set North (Reset)</button>
        
        <div class="hud-panel">
            <div class="hud-row"><span class="hud-label">HEADING (α)</span> <span id="val-alpha" class="hud-val">0°</span></div>
            <div class="hud-row"><span class="hud-label">PITCH (β)</span> <span id="val-beta" class="hud-val">0°</span></div>
            <div class="hud-row"><span class="hud-label">ROLL (γ)</span> <span id="val-gamma" class="hud-val">0°</span></div>
            <div class="hud-row" style="margin-top:15px;"><span class="hud-label">LIFT (G-Force)</span> <span id="val-acc" class="hud-val" style="color:#ff00ff">0.0</span></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SCENE CONFIG ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a10);
        scene.fog = new THREE.Fog(0x0a0a10, 20, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 25, 35); // Elevated view
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. HOLOGRAPHIC ASSETS ---
        
        // A. The Grid Floor
        const gridHelper = new THREE.GridHelper(100, 40, 0xff00ff, 0x222233);
        scene.add(gridHelper);

        // B. The Device Container (Pivot Point)
        const devicePivot = new THREE.Group();
        scene.add(devicePivot);

        // C. The Phone Mesh (Wireframe Style)
        const geoBox = new THREE.BoxGeometry(10, 1, 20); 
        const matWire = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.5 });
        const matSolid = new THREE.MeshBasicMaterial({ color: 0x001122, transparent: true, opacity: 0.9 });
        
        const phoneMesh = new THREE.Mesh(geoBox, matSolid); // Inner dark core
        const phoneWire = new THREE.Mesh(geoBox, matWire);  // Outer neon skeleton
        phoneMesh.add(phoneWire); // Combine them
        
        // Add "Screen" indicator (Top Face)
        const screenGeo = new THREE.PlaneGeometry(9, 19);
        const screenMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.1 });
        const screenMesh = new THREE.Mesh(screenGeo, screenMat);
        screenMesh.rotation.x = -Math.PI / 2;
        screenMesh.position.y = 0.6; // Slightly above body
        phoneMesh.add(screenMesh);

        // Add "Notch/Camera" (Direction Indicator)
        const camGeo = new THREE.CircleGeometry(0.5, 32);
        const camMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
        const camMesh = new THREE.Mesh(camGeo, camMat);
        camMesh.rotation.x = -Math.PI / 2;
        camMesh.position.set(0, 0.65, -8); // Top of phone
        phoneMesh.add(camMesh);

        devicePivot.add(phoneMesh);

        // D. North Arrow (World Reference)
        const arrowDir = new THREE.Vector3(0, 0, -1); // Points North (-Z in Three.js)
        const arrowOrigin = new THREE.Vector3(0, 0.1, 0);
        const arrowHelper = new THREE.ArrowHelper(arrowDir, arrowOrigin, 15, 0xff00ff, 2, 2);
        scene.add(arrowHelper);

        // --- 3. PHYSICS STATE ---
        let orient = { alpha: 0, beta: 0, gamma: 0 };
        let offsetAlpha = 0; // Calibration offset
        let velocityY = 0;
        let posY = 2; // Hover height
        
        // UI References
        const ui = {
            alpha: document.getElementById('val-alpha'),
            beta: document.getElementById('val-beta'),
            gamma: document.getElementById('val-gamma'),
            acc: document.getElementById('val-acc')
        };

        // --- 4. SENSOR HANDLERS ---
        
        function handleOrientation(e) {
            // Capture raw data
            let a = e.alpha || 0;
            let b = e.beta || 0;
            let g = e.gamma || 0;

            // Handle Android Chrome "Absolute" event difference
            if (e.webkitCompassHeading) {
                // iOS Logic: Direct True North
                offsetAlpha = 0; 
                orient.alpha = e.webkitCompassHeading;
            } else {
                // Android Logic: Apply offset
                // Note: Android Alpha increases Counter-Clockwise, iOS Clockwise
                // We standardize to Clockwise for 3D rotation
                orient.alpha = a; 
            }
            
            orient.beta = b;
            orient.gamma = g;
        }

        function handleMotion(e) {
            const acc = e.acceleration;
            if (!acc) return;
            
            // Simple Impulse Physics for "Lift"
            // If Z-accel (up/down) is high, add velocity
            if (Math.abs(acc.z) > 1.0) {
                velocityY += acc.z * 0.05;
            }
            
            // Clamp visuals
            const totalForce = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
            ui.acc.innerText = totalForce.toFixed(1) + " G";
        }

        // --- 5. CALIBRATION ---
        document.getElementById('cal-btn').addEventListener('click', () => {
            // User points North -> Clicks Button
            // We set current alpha as "Zero" (North)
            offsetAlpha = orient.alpha;
        });

        // --- 6. RENDER LOOP (THE MATH FIX) ---
        function animate() {
            requestAnimationFrame(animate);

            // A. ROTATION MAPPING (Euler to Quaternion)
            // Three.js Order: 'ZXY' is usually best for phones to prevent Gimbal Lock
            const deg2rad = Math.PI / 180;
            
            // Calculate "True" Alpha based on calibration
            // We invert Alpha because 3D Y-rotation is opposite to Compass rotation
            let finalAlpha = (orient.alpha - offsetAlpha); 

            // Update UI Text
            ui.alpha.innerText = Math.round((360 - finalAlpha) % 360) + "°";
            ui.beta.innerText = Math.round(orient.beta) + "°";
            ui.gamma.innerText = Math.round(orient.gamma) + "°";

            // Apply Rotation
            // Beta = X Axis (Tilt Front/Back)
            // Gamma = Z Axis (Tilt Left/Right) in Device, but Y/Z swap in 3D
            // Alpha = Y Axis (Compass)
            
            // Standard Web Transformation:
            // 1. Rotate around Y (Compass)
            // 2. Rotate around X (Beta)
            // 3. Rotate around Z (Gamma)
            
            devicePivot.rotation.reorder('YXZ');
            devicePivot.rotation.y = finalAlpha * deg2rad * -1; // Invert for correct compass feel
            devicePivot.rotation.x = orient.beta * deg2rad;
            devicePivot.rotation.z = orient.gamma * deg2rad * -1; // Invert for natural roll

            // B. HEIGHT PHYSICS (Spring)
            velocityY -= 0.01; // Gravity
            posY += velocityY;
            
            // Floor Bounce
            if (posY < 2) {
                posY = 2;
                velocityY *= -0.4; // Dampening
            }
            
            devicePivot.position.y = posY;

            // C. Camera Smooth Follow
            // camera.lookAt(devicePivot.position);

            renderer.render(scene, camera);
        }

        // --- 7. INITIALIZATION ---
        document.getElementById('start-btn').addEventListener('click', async () => {
            const overlay = document.getElementById('start-screen');
            
            // iOS Permission Request
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const perm = await DeviceOrientationEvent.requestPermission();
                    if (perm === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        window.addEventListener('devicemotion', handleMotion);
                        overlay.style.display = 'none';
                    } else {
                        alert("Permission Required for Hologram");
                    }
                } catch(e) { console.log(e); }
            } else {
                // Android / PC
                // Try Absolute first (Chrome)
                if ('ondeviceorientationabsolute' in window) {
                    window.addEventListener('deviceorientationabsolute', (e) => handleOrientation({...e, alpha: 360 - e.alpha}));
                } else {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
                window.addEventListener('devicemotion', handleMotion);
                overlay.style.display = 'none';
            }
            
            animate();
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
