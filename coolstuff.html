<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Sensor Reconstruction</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* HUD OVERLAY */
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; z-index: 10; text-shadow: 0 0 5px #0f0; }
        .hud-row { display: flex; gap: 20px; margin-bottom: 5px; font-size: 12px; }
        .label { opacity: 0.7; }
        .val { font-weight: bold; }

        /* PERMISSION BUTTON */
        #start-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; background: rgba(0, 255, 0, 0.1); color: #0f0; border: 2px solid #0f0;
            font-size: 18px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); backdrop-filter: blur(5px);
            z-index: 100; transition: 0.2s;
        }
        #start-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 40px #0f0; }
        
        #north-marker { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; border: 2px solid #333; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); }
        #north-arrow { width: 4px; height: 30px; background: red; transform-origin: bottom center; }
    </style>
    
    <!-- THREE.JS CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
</head>
<body>

    <div id="hud">
        <div class="hud-row"><span class="label">ALPHA (COMPASS)</span> <span id="d-alpha" class="val">0°</span></div>
        <div class="hud-row"><span class="label">BETA (TILT F/B)</span> <span id="d-beta" class="val">0°</span></div>
        <div class="hud-row"><span class="label">GAMMA (TILT L/R)</span> <span id="d-gamma" class="val">0°</span></div>
        <div class="hud-row" style="margin-top:10px;"><span class="label">ACCEL Z (LIFT)</span> <span id="d-acc" class="val">0.0</span></div>
        <div class="hud-row" style="color:#aaa; font-size:10px;">*Position is simulated via Physics Impulse</div>
    </div>

    <button id="start-btn">INITIALIZE SENSOR LINK</button>

    <div id="north-marker">
        <div id="north-arrow"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 50); // High angle looking down
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2); // Soft white light
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 3);
        dirLight.position.set(10, 50, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);
        
        const greenLight = new THREE.PointLight(0x00ff00, 5, 50);
        greenLight.position.set(0, 10, 0);
        scene.add(greenLight);

        // --- 3. OBJECTS ---
        
        // A. The "Floor" (Grid)
        const gridHelper = new THREE.GridHelper(100, 50, 0x333333, 0x111111);
        scene.add(gridHelper);

        // B. The "Phone" (Mesh)
        const phoneGeo = new THREE.BoxGeometry(14, 1, 28); // Roughly 1:2 aspect ratio
        const phoneMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2, metalness: 0.8 });
        const screenMat = new THREE.MeshBasicMaterial({ color: 0x000000 }); // Dark Screen
        
        // Multi-material for the phone (Sides black, Top screen)
        // Order: Right, Left, Top, Bottom, Front, Back
        const materials = [phoneMat, phoneMat, screenMat, phoneMat, phoneMat, phoneMat];
        
        const phone = new THREE.Mesh(phoneGeo, materials);
        phone.castShadow = true;
        
        // Add a "Notch" or indicator to show top of phone
        const notchGeo = new THREE.BoxGeometry(4, 0.2, 1);
        const notchMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
        const notch = new THREE.Mesh(notchGeo, notchMat);
        notch.position.set(0, 0.51, -12); // Near top edge
        phone.add(notch);

        // Add a "Screen Glow"
        const screenLight = new THREE.RectAreaLight(0x00ffcc, 2, 12, 26);
        screenLight.position.set(0, 0.6, 0);
        screenLight.rotation.x = -Math.PI / 2;
        phone.add(screenLight);

        scene.add(phone);

        // --- 4. PHYSICS STATE ---
        let sensorData = { alpha: 0, beta: 0, gamma: 0 };
        let velocity = { x: 0, y: 0, z: 0 };
        let positionOffset = { x: 0, y: 5, z: 0 }; // Start 5 units above floor
        
        // UI References
        const ui = {
            alpha: document.getElementById('d-alpha'),
            beta: document.getElementById('d-beta'),
            gamma: document.getElementById('d-gamma'),
            acc: document.getElementById('d-acc'),
            arrow: document.getElementById('north-arrow'),
            btn: document.getElementById('start-btn')
        };

        // --- 5. SENSOR LOGIC ---
        
        function handleOrientation(event) {
            // Alpha: Rotation around Z (Compass) [0, 360]
            // Beta: Rotation around X (Front/Back) [-180, 180]
            // Gamma: Rotation around Y (Left/Right) [-90, 90]

            let { alpha, beta, gamma } = event;
            
            // Null check
            if (alpha === null) alpha = 0;
            if (beta === null) beta = 0;
            if (gamma === null) gamma = 0;

            sensorData = { alpha, beta, gamma };

            // Update HUD
            ui.alpha.innerText = Math.round(alpha) + "°";
            ui.beta.innerText = Math.round(beta) + "°";
            ui.gamma.innerText = Math.round(gamma) + "°";
            
            // Update North Arrow on UI
            // Alpha increases as you rotate Left (Counter-Clockwise) on Android
            ui.arrow.style.transform = `rotate(${alpha}deg)`;
        }

        function handleMotion(event) {
            const acc = event.acceleration;
            if (!acc) return;

            // Apply small "kicks" to velocity based on acceleration
            // We filter small noise (< 0.5) to stop jitter
            const threshold = 0.3;
            
            if (Math.abs(acc.x) > threshold) velocity.x += acc.x * 0.05;
            if (Math.abs(acc.y) > threshold) velocity.z += acc.y * 0.05; // Phone Y is World Z in 3D
            if (Math.abs(acc.z) > threshold) velocity.y += acc.z * 0.05; // Phone Z is World Y (Height)

            ui.acc.innerText = (acc.z || 0).toFixed(1);
        }

        // --- 6. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // A. APPLY ROTATION (Quaternion Math)
            // Convert Sensor Euler (Degrees) to Three.js Euler (Radians)
            // Note: DeviceOrientation defines axes differently than Three.js
            // We must map: Beta -> X, Gamma -> Y, Alpha -> Z
            
            const euler = new THREE.Euler();
            const degToRad = Math.PI / 180;

            // The standard mapping for mobile to 3D space
            // We offset Beta by 90 if we want the phone to start flat
            euler.x = sensorData.beta * degToRad; 
            euler.y = -sensorData.alpha * degToRad; // Invert for correct compass rotation
            euler.z = -sensorData.gamma * degToRad; 

            // Smoothly interpolate rotation (Slerp equivalent for Euler)
            // For instant response, we assign directly:
            phone.rotation.set(euler.x, euler.y, euler.z);

            // B. SIMULATE POSITION (Spring Physics)
            // We use a "Spring" logic: Move by velocity, but pull back to center
            
            positionOffset.x += velocity.x;
            positionOffset.y += velocity.y;
            positionOffset.z += velocity.z;

            // Apply Friction (Slow down movement)
            velocity.x *= 0.9;
            velocity.y *= 0.9;
            velocity.z *= 0.9;

            // Apply Spring Force (Pull back to origin 0, 5, 0)
            const k = 0.05; // Spring constant
            velocity.x -= (positionOffset.x - 0) * k;
            velocity.y -= (positionOffset.y - 5) * k; // Return to height of 5
            velocity.z -= (positionOffset.z - 0) * k;

            // Hard floor constraint
            if (positionOffset.y < 1) positionOffset.y = 1;

            phone.position.set(positionOffset.x, positionOffset.y, positionOffset.z);

            // Camera Follow (Optional - gives dynamic feel)
            // camera.lookAt(phone.position);

            renderer.render(scene, camera);
        }

        // --- 7. INITIALIZATION ---
        ui.btn.addEventListener('click', async () => {
            // iOS Permission Check
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        window.addEventListener('devicemotion', handleMotion);
                    } else {
                        alert("Permission Denied");
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // Non-iOS / Android
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
            }
            
            ui.btn.style.display = 'none';
            animate();
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
